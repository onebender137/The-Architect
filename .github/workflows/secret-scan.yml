name: Secret Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: TruffleHog OSS Scan
        id: trufflehog
        uses: trufflesecurity/trufflehog-oss-action@main
        continue-on-error: true
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || (github.event.before == '0000000000000000000000000000000000000000' && '') || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --json --only-verified=false --exclude-paths=.trufflehog-ignore

      - name: Process Findings and Comment
        if: github.event_name == 'pull_request' && steps.trufflehog.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            let results = [];

            try {
              // We re-run trufflehog to capture JSON because the action doesn't easily expose it
              // and shell redirection in extra_args is problematic in the Docker action.
              const base = context.payload.pull_request.base.sha;
              const head = context.payload.pull_request.head.sha;

              // Install trufflehog binary for the script
              execSync('curl -sSfL https://raw.githubusercontent.com/trufflesecurity/trufflehog/main/scripts/install.sh | sh -s -- -b /tmp', { stdio: 'ignore' });

              const output = execSync(`/tmp/trufflehog git file://. --since-commit ${base} --json --only-verified=false --exclude-paths=.trufflehog-ignore`, { encoding: 'utf8' });

              results = output.trim().split('\n')
                .filter(line => line.trim() !== '')
                .map(line => JSON.parse(line));
            } catch (e) {
              console.log("Error processing findings:", e.message);
              // If it failed because it found secrets (exit code 1), we might still have output in the error object
              if (e.stdout) {
                try {
                  results = e.stdout.trim().split('\n')
                    .filter(line => line.trim() !== '')
                    .map(line => JSON.parse(line));
                } catch (innerError) {
                  console.log("Error parsing stdout after failure:", innerError.message);
                }
              }
            }

            let commentBody = "### ⚠️ Potential Secrets Detected!\n\n";
            commentBody += "The secret scanner has identified potential secrets in this Pull Request. Please review the following files and ensure no sensitive information is being committed.\n\n";

            if (results.length > 0) {
              commentBody += "| File | Line | Commit | Type |\n";
              commentBody += "| :--- | :--- | :--- | :--- |\n";
              const seen = new Set();
              results.forEach(result => {
                const file = result.SourceMetadata?.Data?.Git?.file || "Unknown";
                const line = result.SourceMetadata?.Data?.Git?.line || "-";
                const commit = result.SourceMetadata?.Data?.Git?.commit?.substring(0, 7) || "Unknown";
                const type = result.DetectorName || "Unknown";
                const key = `${file}:${line}:${type}`;
                if (!seen.has(key)) {
                  commentBody += `| \`${file}\` | ${line} | \`${commit}\` | ${type} |\n`;
                  seen.add(key);
                }
              });
            } else {
              commentBody += "Secrets were detected, but detailed information could not be parsed. Please check the [Action logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.\n";
            }

            commentBody += "\n**Action Required:** If these are valid secrets, rotate them immediately and remove them from the git history. If this is a false positive, add the file or secret to `.trufflehog-ignore`.";

            try {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } catch (err) {
              console.log("Failed to post comment. This might be due to fork PR permissions.", err.message);
            }

      - name: Final Check
        if: steps.trufflehog.outcome == 'failure'
        run: |
          echo "Secrets were detected. Failing the build."
          exit 1
